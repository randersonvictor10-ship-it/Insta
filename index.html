<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Simulator</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
<div id="root"></div>

<script>
const { useState } = React;

function App() {
  const [username, setUsername] = useState("");
  const [followers, setFollowers] = useState(1200);
  const [loading, setLoading] = useState(false);

  const simulate = (amount) => {
    setLoading(true);

    setTimeout(() => {
      let current = followers;
      let end = followers + amount;

      const interval = setInterval(() => {
        current += Math.ceil(amount / 30);

        if (current >= end) {
          current = end;
          clearInterval(interval);
          setLoading(false);
        }

        setFollowers(current);
      }, 50);

    }, 1000);
  };

  return React.createElement("div", {
    style: {
      minHeight: "100vh",
      background: "linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)",
      color: "white",
      textAlign: "center",
      padding: "20px"
    }
  },

    React.createElement("h1", null, "Instagram Growth Simulator"),

    React.createElement("input", {
      placeholder: "@username",
      value: username,
      onChange: e => setUsername(e.target.value),
      style: {padding:"10px", margin:"10px", color:"black"}
    }),

    React.createElement("div", null,
      [1000,5000,10000].map(n =>
        React.createElement("button", {
          key:n,
          onClick:()=>simulate(n),
          style:{margin:"5px", padding:"10px"}
        }, "+"+n)
      )
    ),

    loading
      ? React.createElement("p", null, "Simulando...")
      : React.createElement("h2", null, "Followers: " + followers)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
</script>

</body>
</html>
